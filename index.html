
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Seven-Connect v6.0 Ranking Visual</title>
<style>
body{
font-family: Arial, sans-serif;
background:#f5f2e9;
padding:40px;
}
.card{
background:white;
border-radius:16px;
padding:20px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.title{
font-size:28px;
font-weight:bold;
color:#123b63;
}
.bar{
height:20px;
border-radius:10px;
background:#ddd;
overflow:hidden;
margin-top:10px;
}
.fill-green{
height:100%;
width:90%;
background:#2ecc71;
}
.fill-blue{
height:100%;
width:55%;
background:#5dade2;
}
.fill-orange{
height:100%;
width:20%;
background:#f39c12;
}
</style>
</head>
<body>

<div class="card">
<div class="title">🏆 Ranking evangelístico</div>
<p>Diseño visual actualizado para Seven-Connect.</p>

<h3>Campaña Extraordinaria</h3>
<div class="bar"><div class="fill-green"></div></div>

<h3>Campaña Excelente</h3>
<div class="bar"><div class="fill-blue"></div></div>

<h3>Campaña Buena</h3>
<div class="bar"><div class="fill-orange"></div></div>
</div>

</body>
</html>
