// ─── MAIN APP ───
function App() {
  const [user, setUser] = useState(null);
  const [screen, setScreen] = useState("welcome");
  const [currentLeccion, setCurrentLeccion] = useState(null);
  const [progress, setProgress] = useState({});
  const [loading, setLoading] = useState(true);
  const [showConfetti, setShowConfetti] = useState(false);
  const [syncStatus, setSyncStatus] = useState("idle"); // idle, syncing, synced, error

  // Load user & progress on mount
  useEffect(() => {
    (async () => {
      try {
        // Try loading from local storage first (fast)
        const u = (() => { const v = localStorage.getItem("fdj_user"); return v ? { value: v } : null; })();
        if (u) {
          const userData = JSON.parse(u.value);
          setUser(userData);
          setScreen("dashboard");

          // If user has supabase ID, load progress from Supabase
          if (userData.supabase_id) {
            try {
              const rows = await supaFetch(`progreso?estudiante_id=eq.${userData.supabase_id}&select=leccion_id,completed_at`);
              if (rows && rows.length > 0) {
                const p = {};
                rows.forEach(r => { p[r.leccion_id] = { completed: true, date: r.completed_at }; });
                setProgress(p);
                localStorage.setItem("fdj_progress", JSON.stringify(p));
              }
            } catch {
              // Fallback to local progress
              const p = (() => { const v = localStorage.getItem("fdj_progress"); return v ? { value: v } : null; })();
              if (p) setProgress(JSON.parse(p.value));
            }
          } else {
            const p = (() => { const v = localStorage.getItem("fdj_progress"); return v ? { value: v } : null; })();
            if (p) setProgress(JSON.parse(p.value));
          }
        }
      } catch {}
      setLoading(false);
    })();
  }, []);

  const saveUser = async (data) => {
    setUser(data);
    try { localStorage.setItem("fdj_user", JSON.stringify(data)); } catch {}
  };

  const saveProgress = async (newProgress) => {
    setProgress(newProgress);
    try { localStorage.setItem("fdj_progress", JSON.stringify(newProgress)); } catch {}
  };

  const completarLeccion = async (leccionId) => {
    const np = { ...progress, [leccionId]: { completed: true, date: new Date().toISOString() } };
    await saveProgress(np);

    // Sync to Supabase
    if (user?.supabase_id) {
      setSyncStatus("syncing");
      try {
        await supaFetch("progreso", {
          method: "POST",
          body: {
            estudiante_id: user.supabase_id,
            leccion_id: leccionId,
            correctas: 3,
            total_preguntas: 3,
          },
          headers: { Prefer: "return=representation,resolution=merge-duplicates" },
          prefer: "return=representation,resolution=merge-duplicates",
        });
        setSyncStatus("synced");
      } catch (err) {
        console.error("Error syncing progress:", err);
        setSyncStatus("error");
      }
      setTimeout(() => setSyncStatus("idle"), 2500);
    }

    const totalCompleted = Object.keys(np).filter(k => np[k]?.completed).length;
    if (totalCompleted === 20) {
      setShowConfetti(true);
      setTimeout(() => { setShowConfetti(false); setScreen("certificado"); }, 3000);
    } else {
      setCurrentLeccion(null);
      setScreen("dashboard");
    }
  };

  const completedCount = Object.keys(progress).filter(k => progress[k]?.completed).length;
  const pct = Math.round((completedCount / 20) * 100);

  const resetAll = async () => {
    try { localStorage.removeItem("fdj_user"); } catch {}
    try { localStorage.removeItem("fdj_progress"); } catch {}
    setUser(null);
    setProgress({});
    setScreen("welcome");
    setCurrentLeccion(null);
  };

  if (loading) return <LoadingScreen />;

  return (
    <div style={{ fontFamily: "'Source Sans 3', sans-serif", minHeight: "100vh", background: "linear-gradient(160deg, #030f1c 0%, #061a2e 45%, #0a1f38 100%)", color: "#e8f4f8" }}>
      <style>{fonts}</style>
      {showConfetti && <Confetti />}

      {/* Sync indicator */}
      {syncStatus !== "idle" && (
        <div style={{
          position: "fixed", top: 12, right: 12, zIndex: 9999,
          padding: "8px 16px", borderRadius: 20, fontSize: 12, fontWeight: 600,
          background: syncStatus === "syncing" ? "rgba(0,212,200,.9)" : syncStatus === "synced" ? "rgba(34,197,94,.9)" : "rgba(239,68,68,.9)",
          color: "#fff",
          animation: "fadeUp .3s ease",
          backdropFilter: "blur(8px)",
        }}>
          {syncStatus === "syncing" && "⏳ Sincronizando..."}
          {syncStatus === "synced" && "✓ Guardado en la nube"}
          {syncStatus === "error" && "⚠ Guardado localmente"}
        </div>
      )}

      {screen === "welcome" && <WelcomeScreen onStart={() => setScreen("register")} onAdmin={() => setScreen("admin")} />}
      {screen === "register" && <RegisterScreen onRegister={(d) => { saveUser(d); setScreen("dashboard"); }} onBack={() => setScreen("welcome")} />}
      {screen === "dashboard" && (
        <Dashboard
          user={user}
          progress={progress}
          pct={pct}
          completedCount={completedCount}
          onSelectLeccion={(l) => { setCurrentLeccion(l); setScreen("leccion"); }}
          onCertificado={() => setScreen("certificado")}
          onReset={resetAll}
        />
      )}
      {screen === "leccion" && currentLeccion && (
        <LeccionView
          leccion={currentLeccion}
          onComplete={() => completarLeccion(currentLeccion.id)}
          onBack={() => { setCurrentLeccion(null); setScreen("dashboard"); }}
          isCompleted={!!progress[currentLeccion.id]?.completed}
        />
      )}
      {screen === "certificado" && (
        <CertificadoView user={user} onBack={() => setScreen("dashboard")} />
      )}
      {screen === "admin" && (
        <AdminPanel onBack={() => setScreen("welcome")} />
      )}
    </div>
  );
}

// ─── REGISTER (CONNECTED TO SUPABASE) ───
function RegisterScreen({ onRegister, onBack }) {
  const [form, setForm] = useState({ nombre: "", telefono: "", departamento: "", ciudad: "", instructor: "", nombreInstructor: "", distritoId: "", iglesiaId: "" });
  const [errors, setErrors] = useState({});
  const [distritos, setDistritos] = useState([]);
  const [iglesias, setIglesias] = useState([]);
  const [loadingData, setLoadingData] = useState(true);
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState("");

  // Load distritos and iglesias from Supabase on mount
  useEffect(() => {
    (async () => {
      try {
        const [distData, iglData] = await Promise.all([
          supaFetch("distritos?select=id,nombre&order=nombre"),
          supaFetch("iglesias?select=id,nombre,distrito_id&order=nombre"),
        ]);
        setDistritos(distData || []);
        setIglesias(iglData || []);
      } catch (err) {
        console.error("Error loading data:", err);
      }
      setLoadingData(false);
    })();
  }, []);

  // Iglesias filtered by selected distrito
  const iglesiasFiltradas = form.distritoId
    ? iglesias.filter(i => i.distrito_id === form.distritoId)
    : [];

  const validate = () => {
    const e = {};
    if (!form.nombre.trim()) e.nombre = true;
    if (!form.telefono.trim()) e.telefono = true;
    if (!form.departamento) e.departamento = true;
    if (!form.ciudad.trim()) e.ciudad = true;
    if (!form.instructor) e.instructor = true;
    if (!form.nombreInstructor.trim()) e.nombreInstructor = true;
    if (!form.distritoId) e.distritoId = true;
    if (!form.iglesiaId) e.iglesiaId = true;
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = async () => {
    if (!validate()) return;
    setSubmitting(true);
    setSubmitError("");

    try {
      // Insert student in Supabase
      const result = await supaFetch("estudiantes", {
        method: "POST",
        body: {
          nombre: form.nombre.trim(),
          telefono: form.telefono.trim(),
          iglesia_id: form.iglesiaId,
          instructor_nombre: form.nombreInstructor.trim(),
          instructor_rol: form.instructor,

      });

      const supabaseId = result?.[0]?.id;
      const iglesiaMatch = iglesias.find(i => i.id === form.iglesiaId);

      // Save locally with supabase ID

        ...form,
        supabase_id: supabaseId,
        registeredAt: new Date().toISOString(),
        iglesia_nombre: iglesiaMatch?.nombre || null,
        distrito_nombre: distritoMatch?.nombre || null,

                      <span style={{ color: "#888" }}> — {distritos.find(d => d.id === form.distritoId)?.nombre}</span>

            <div style={{ borderTop: "1px solid rgba(255,255,255,.08)", paddingTop: 18, marginTop: 4 }}>
              <p style={{ fontSize: 13, background: "linear-gradient(135deg,#00d4c8,#e91e8c)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", fontWeight: 700, margin: "0 0 14px", letterSpacing: .5 }}>👤 INFORMACIÓN DEL INSTRUCTOR</p>

                <div>
                  <label style={labelStyle}>Nombre del instructor *</label>
                  <input style={inputStyle(errors.nombreInstructor)} placeholder="Nombre de quien le da el curso" value={form.nombreInstructor} onChange={e => setForm({ ...form, nombreInstructor: e.target.value })} onFocus={e => e.target.style.borderColor = "#00d4c8"} onBlur={e => e.target.style.borderColor = errors.nombreInstructor ? "#ef4444" : "rgba(0,212,200,.15)"} />
                </div>
              </div>
            </div>
          </div>

          {Object.keys(errors).length > 0 && (
            <p style={{ color: "#ef4444", fontSize: 13, marginTop: 14, textAlign: "center" }}>
              Por favor completa todos los campos marcados con *
            </p>
          )}

          {submitError && (
            <p style={{ color: "#00d4c8", fontSize: 13, marginTop: 14, textAlign: "center", background: "rgba(0,212,200,.06)", padding: "10px 14px", borderRadius: 10 }}>
              {submitError}
            </p>
          )}

          <button onClick={handleSubmit} disabled={submitting} style={{
            width: "100%", marginTop: 24, padding: "16px",
            background: submitting ? "rgba(0,212,200,.4)" : "linear-gradient(135deg, #00d4c8, #7c3aed, #e91e8c)",
            color: "#fff", border: "none", borderRadius: 12,
            fontSize: 16, fontWeight: 700, cursor: submitting ? "not-allowed" : "pointer",
            fontFamily: "'Source Sans 3', sans-serif",
            boxShadow: submitting ? "none" : "0 4px 24px rgba(0,212,200,.25)",
            transition: "transform .2s",
          }}
            onMouseOver={e => !submitting && (e.target.style.transform = "translateY(-1px)")}
            onMouseOut={e => e.target.style.transform = "translateY(0)"}
          >
            {submitting ? "REGISTRANDO..." : "REGISTRARME Y COMENZAR"}
          </button>
        </div>
        <style>{`@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }`}</style>
      </div>
    </div>
  );
}

// ─── LECCION VIEW ───
function LeccionView({ leccion, onComplete, onBack, isCompleted }) {
  const [step, setStep] = useState(0);
  const [revealed, setRevealed] = useState({});
  const [allRevealed, setAllRevealed] = useState(false);
  const totalSteps = leccion.preguntas.length + 2;

  const revealAnswer = (idx) => {
    const nr = { ...revealed, [idx]: true };
    setRevealed(nr);
    if (Object.keys(nr).length === leccion.preguntas.length) setAllRevealed(true);
  };

  const containerRef = useRef(null);
  useEffect(() => { containerRef.current?.scrollTo({ top: 0, behavior: "smooth" }); }, [step]);

  return (
    <div ref={containerRef} style={{ minHeight: "100vh", padding: "24px 16px 80px", overflow: "auto" }}>
      <div style={{ maxWidth: 640, margin: "0 auto", animation: "fadeUp .4s ease" }}>
        {/* Back & Progress */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <button onClick={onBack} style={{ background: "none", border: "none", color: "#5a9aaa", cursor: "pointer", fontSize: 14, fontFamily: "'Source Sans 3'" }}>← Volver</button>
          <div style={{ display: "flex", gap: 4 }}>
            {Array.from({ length: totalSteps }).map((_, i) => (
              <div key={i} style={{
                width: i === step ? 24 : 8, height: 8, borderRadius: 4,
                background: i <= step ? "#00d4c8" : "rgba(255,255,255,.08)",
                transition: "all .3s ease",
              }} />
            ))}
          </div>
        </div>

        {/* Lesson Header */}
        <div style={{ marginBottom: 28 }}>
          <div style={{ fontSize: 12, color: "#5a9aaa", letterSpacing: 3, fontWeight: 600, marginBottom: 4 }}>LECCIÓN {leccion.id} DE 20</div>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(22px, 5vw, 32px)", fontWeight: 700, margin: 0, background: "linear-gradient(135deg, #00d4c8, #e91e8c)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", lineHeight: 1.2 }}>
            {leccion.icono} {leccion.titulo}
          </h2>
        </div>

        {/* INTRO STEP */}
        {step === 0 && (
          <div style={{ animation: "fadeUp .4s ease" }}>
            <div style={{
              background: "rgba(0,212,200,.05)", borderRadius: 20, padding: "32px 24px",
              border: "1px solid rgba(0,212,200,.15)", marginBottom: 24, textAlign: "center",
            }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>{leccion.icono}</div>
              <p style={{ fontSize: 17, color: "#c4b5a0", lineHeight: 1.8, margin: 0, fontStyle: "italic" }}>{leccion.intro}</p>
            </div>
            <p style={{ fontSize: 14, color: "#888", textAlign: "center", marginBottom: 20 }}>
              Esta lección contiene {leccion.preguntas.length} preguntas con sus versículos bíblicos. Lee cada versículo y descubre las respuestas que Dios tiene para ti.
            </p>
            <button onClick={() => setStep(1)} style={{
              width: "100%", padding: "16px",
              background: "linear-gradient(135deg, #00d4c8, #7c3aed, #e91e8c)",
              color: "#fff", border: "none", borderRadius: 14,
              fontSize: 16, fontWeight: 700, cursor: "pointer",
              fontFamily: "'Source Sans 3', sans-serif",
              boxShadow: "0 4px 20px rgba(0,212,200,.2)",
            }}>
              COMENZAR ESTUDIO →
            </button>
          </div>
        )}

        {/* QUESTION STEPS */}
        {step >= 1 && step <= leccion.preguntas.length && (() => {
          const qi = step - 1;
          const q = leccion.preguntas[qi];
          const isRevealed = !!revealed[qi];
          return (
            <div key={qi} style={{ animation: "fadeUp .4s ease" }}>
              <div style={{
                background: "rgba(255,255,255,.03)", borderRadius: 20, padding: "28px 22px",
                border: "1px solid rgba(255,255,255,.08)", marginBottom: 20,
              }}>
                <div style={{ fontSize: 11, background: "linear-gradient(135deg,#00d4c8,#e91e8c)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", fontWeight: 700, letterSpacing: 2, marginBottom: 12 }}>
                  PREGUNTA {qi + 1} DE {leccion.preguntas.length}
                </div>
                <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, fontWeight: 600, margin: "0 0 20px", color: "#e8f4f8", lineHeight: 1.4 }}>
                  {q.pregunta}
                </h3>

                {/* Verse Reference */}
                <div style={{
                  background: "rgba(0,212,200,.06)", borderRadius: 12, padding: "12px 16px",
                  border: "1px solid rgba(0,212,200,.15)", marginBottom: 16,
                  display: "flex", alignItems: "center", gap: 10,
                }}>
                  <span style={{ fontSize: 20 }}>📖</span>
                  <div>
                    <div style={{ fontSize: 11, color: "#3d6878", letterSpacing: 1 }}>BUSCA LA RESPUESTA EN</div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: "#00d4c8" }}>{q.cita}</div>
                  </div>
                </div>

                {/* Reveal Button / Answer */}
                {!isRevealed ? (
                  <button onClick={() => revealAnswer(qi)} style={{
                    width: "100%", padding: "16px",
                    background: "rgba(0,212,200,.06)", border: "2px dashed rgba(0,212,200,.3)",
                    borderRadius: 14, color: "#00d4c8", fontSize: 15, fontWeight: 600,
                    cursor: "pointer", fontFamily: "'Source Sans 3', sans-serif",
                    transition: "all .2s",
                  }}
                    onMouseOver={e => { e.currentTarget.style.background = "rgba(0,212,200,.12)"; e.currentTarget.style.borderColor = "rgba(0,212,200,.5)"; }}
                    onMouseOut={e => { e.currentTarget.style.background = "rgba(0,212,200,.06)"; e.currentTarget.style.borderColor = "rgba(0,212,200,.3)"; }}
                  >
                    👆 TOCA PARA VER LA RESPUESTA
                  </button>
                ) : (
                  <div style={{ animation: "fadeUp .4s ease" }}>
                    {/* Bible Text */}
                    <div style={{
                      background: "linear-gradient(135deg, rgba(0,212,200,.08), rgba(233,30,140,.04))",
                      borderRadius: 14, padding: "20px", marginBottom: 16,
                      borderLeft: "4px solid #00d4c8",
                    }}>
                      <p style={{ fontSize: 17, color: "#e8f4f8", lineHeight: 1.7, margin: "0 0 8px", fontStyle: "italic", fontFamily: "'Playfair Display', serif" }}>
                        "{q.texto}"
                      </p>
                      <p style={{ fontSize: 13, color: "#00d4c8", fontWeight: 600, margin: 0, textAlign: "right" }}>— {q.cita}</p>
                    </div>
                    {/* Explanation */}
                    <div style={{
                      background: "rgba(0,212,200,.03)", borderRadius: 14, padding: "18px",
                      border: "1px solid rgba(0,212,200,.1)",
                    }}>
                      <div style={{ fontSize: 11, color: "#5a9aaa", fontWeight: 600, letterSpacing: 1, marginBottom: 8 }}>💡 PARA ENTENDER MEJOR</div>
                      <p style={{ fontSize: 15, color: "#8ec8d0", lineHeight: 1.7, margin: 0 }}>{q.explicacion}</p>
                    </div>
                  </div>
                )}
              </div>

              {/* Navigation */}
              <div style={{ display: "flex", gap: 12 }}>
                {step > 1 && (
                  <button onClick={() => setStep(step - 1)} style={{
                    flex: 1, padding: "14px", background: "rgba(0,212,200,.04)",
                    border: "1px solid rgba(0,212,200,.15)", borderRadius: 12,
                    color: "#5a9aaa", fontSize: 14, fontWeight: 600, cursor: "pointer",
                    fontFamily: "'Source Sans 3', sans-serif",
                  }}>
                    ← Anterior
                  </button>
                )}
                {isRevealed && (
                  <button onClick={() => setStep(step + 1)} style={{
                    flex: 2, padding: "14px",

// ─── ADMIN PANEL ───
function AdminPanel({ onBack }) {
  const [admin, setAdmin] = useState(null);
  const [loginForm, setLoginForm] = useState({ email: "", password: "" });
  const [loginError, setLoginError] = useState("");
  const [logging, setLogging] = useState(false);
  const [tab, setTab] = useState("dashboard");
  const [showChangePass, setShowChangePass] = useState(false);
  const [forceChangePass, setForceChangePass] = useState(false);

  // Check saved session
  useEffect(() => {
    try {
      const saved = localStorage.getItem("fdj_admin");
      if (saved) {
        const parsed = JSON.parse(saved);
        setAdmin(parsed);
        if (parsed.password_temporal) setForceChangePass(true);
      }
    } catch {}
  }, []);

  const handleLogin = async () => {
    setLogging(true);
    setLoginError("");
    try {
      const result = await supaFetch(
        `pastores?email=eq.${encodeURIComponent(loginForm.email)}&select=id,nombre,email,distrito_id,rol`
      );
      if (!result || result.length === 0) {
        setLoginError("Email no encontrado");
        setLogging(false);
        return;
      }
      // Try normal password first, then temp_ prefixed
      let passCheck = await supaFetch(
        `pastores?email=eq.${encodeURIComponent(loginForm.email)}&password_hash=eq.${encodeURIComponent(loginForm.password)}&select=id,nombre,email,distrito_id,rol,password_hash`
      );
      if (!passCheck || passCheck.length === 0) {
        // Try with temp_ prefix (temporary passwords)
        passCheck = await supaFetch(
          `pastores?email=eq.${encodeURIComponent(loginForm.email)}&password_hash=eq.${encodeURIComponent("temp_" + loginForm.password)}&select=id,nombre,email,distrito_id,rol,password_hash`
        );
      }
      if (!passCheck || passCheck.length === 0) {
        setLoginError("Contraseña incorrecta");
        setLogging(false);
        return;
      }
      const adminData = passCheck[0];
      // Check if password is temporary (starts with "temp_" or is short/generic)
      const isTempPass = adminData.password_hash.startsWith("temp_");
      delete adminData.password_hash;
      adminData.password_temporal = isTempPass;
      setAdmin(adminData);
      localStorage.setItem("fdj_admin", JSON.stringify(adminData));
      if (isTempPass) setForceChangePass(true);
    } catch (err) {
      setLoginError("Error de conexión. Intenta de nuevo.");
    }
    setLogging(false);
  };

  const handleLogout = () => {
    setAdmin(null);
    localStorage.removeItem("fdj_admin");
  };

  const isSuperadmin = admin?.rol === "superadmin";

  const inputStyle = (hasError) => ({
    width: "100%", padding: "14px 16px", background: "rgba(0,212,200,.04)",
    border: `1.5px solid ${hasError ? "#ef4444" : "rgba(0,212,200,.15)"}`,

    fontFamily: "'Source Sans 3', sans-serif", outline: "none",

  // ─── LOGIN SCREEN ───
  if (!admin) {

      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "24px 16px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: "15%", left: "8%", width: 250, height: 250, borderRadius: "50%", background: "radial-gradient(circle, rgba(0,212,200,.1) 0%, transparent 70%)", pointerEvents: "none" }} />

            ← Volver al inicio

          <div style={{ textAlign: "center", marginBottom: 32 }}>

            </div>
            <div>
              <label style={{ fontSize: 13, fontWeight: 600, color: "#5a9aaa", marginBottom: 6, display: "block" }}>Contraseña</label>
              <input style={inputStyle(false)} placeholder="••••••••" type="password" value={loginForm.password} onChange={e => setLoginForm({ ...loginForm, password: e.target.value })} onFocus={e => e.target.style.borderColor = "#00d4c8"} onBlur={e => e.target.style.borderColor = "rgba(0,212,200,.15)"} onKeyDown={e => e.key === "Enter" && handleLogin()} />
            </div>

            <button onClick={handleLogin} disabled={logging} style={{

              boxShadow: logging ? "none" : "0 4px 24px rgba(0,212,200,.25)",

      setAdmin(updated);
      localStorage.setItem("fdj_admin", JSON.stringify(updated));
      setForceChangePass(false);

  // ─── CHANGE PASSWORD (voluntary) ───
  if (showChangePass) {
    return <ChangePasswordScreen admin={admin} onDone={() => setShowChangePass(false)} onCancel={() => setShowChangePass(false)} isForced={false} />;
  }

  // ─── ADMIN DASHBOARD ───
  return (
    <div style={{ minHeight: "100vh", padding: "24px 16px 60px" }}>
      <div style={{ maxWidth: 960, margin: "0 auto", animation: "fadeUp .5s ease" }}>
        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 28, flexWrap: "wrap", gap: 12, padding: "18px 20px", background: "rgba(0,212,200,.04)", borderRadius: 18, border: "1px solid rgba(0,212,200,.12)" }}>

            <div style={{ padding: 3, borderRadius: "50%", background: "linear-gradient(135deg, rgba(0,212,200,.3), rgba(233,30,140,.3))", flexShrink: 0 }}>
              <img src="logo.png.jpeg" alt="Logo" style={{ width: 52, height: 52, borderRadius: "50%", display: "block" }} />

// ─── CHANGE PASSWORD SCREEN ───
function ChangePasswordScreen({ admin, onDone, onCancel, isForced }) {
  const [form, setForm] = useState({ current: "", newPass: "", confirm: "" });
  const [error, setError] = useState("");
  const [success, setSuccess] = useState(false);
  const [saving, setSaving] = useState(false);

  const inputStyle = {
    width: "100%", padding: "14px 16px", background: "rgba(0,212,200,.04)",
    border: "1.5px solid rgba(0,212,200,.15)", borderRadius: 12, color: "#e8f4f8",
    fontSize: 15, fontFamily: "'Source Sans 3'", outline: "none", boxSizing: "border-box",
  };

  const handleChange = async () => {
    setError("");
    if (!isForced && !form.current.trim()) { setError("Ingresa tu contraseña actual"); return; }
    if (form.newPass.length < 6) { setError("La nueva contraseña debe tener al menos 6 caracteres"); return; }
    if (form.newPass !== form.confirm) { setError("Las contraseñas no coinciden"); return; }

    setSaving(true);
    try {
      // Verify current password (skip if forced)
      if (!isForced) {
        const check = await supaFetch(`pastores?id=eq.${admin.id}&password_hash=eq.${encodeURIComponent(form.current)}&select=id`);
        if (!check || check.length === 0) { setError("Contraseña actual incorrecta"); setSaving(false); return; }
      }
      // Update password
      await supaFetch(`pastores?id=eq.${admin.id}`, {
        method: "PATCH",
        body: { password_hash: form.newPass },
      });
      setSuccess(true);
      setTimeout(() => onDone(), 1500);
    } catch (err) {
      setError("Error al cambiar la contraseña. Intenta de nuevo.");
    }
    setSaving(false);
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "24px 16px" }}>
      <div style={{ maxWidth: 420, width: "100%", animation: "fadeUp .5s ease" }}>
        {!isForced && onCancel && (
          <button onClick={onCancel} style={{ background: "none", border: "none", color: "#5a9aaa", cursor: "pointer", fontSize: 14, marginBottom: 24, fontFamily: "'Source Sans 3'" }}>
            ← Volver al panel
          </button>
        )}
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>{isForced ? "⚠️" : "🔑"}</div>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 24, fontWeight: 700, background: "linear-gradient(135deg,#00d4c8,#e91e8c)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", margin: "0 0 8px" }}>
            {isForced ? "Cambio de Contraseña Requerido" : "Cambiar Contraseña"}
          </h2>
          {isForced && (
            <p style={{ color: "#5a9aaa", fontSize: 14, lineHeight: 1.6 }}>
              Tu contraseña es temporal. Por seguridad, debes crear una contraseña nueva antes de continuar.
            </p>
          )}
        </div>

        <div style={{ background: "rgba(0,212,200,.03)", borderRadius: 20, padding: "28px 24px", border: "1px solid rgba(0,212,200,.12)", display: "flex", flexDirection: "column", gap: 16 }}>
          {!isForced && (
            <div>
              <label style={{ fontSize: 13, fontWeight: 600, color: "#5a9aaa", marginBottom: 6, display: "block" }}>Contraseña actual</label>
              <input style={inputStyle} type="password" placeholder="Tu contraseña actual" value={form.current} onChange={e => setForm({ ...form, current: e.target.value })} onFocus={e => e.target.style.borderColor = "#00d4c8"} onBlur={e => e.target.style.borderColor = "rgba(0,212,200,.15)"} />
            </div>
          )}
          <div>
            <label style={{ fontSize: 13, fontWeight: 600, color: "#5a9aaa", marginBottom: 6, display: "block" }}>Nueva contraseña</label>
            <input style={inputStyle} type="password" placeholder="Mínimo 6 caracteres" value={form.newPass} onChange={e => setForm({ ...form, newPass: e.target.value })} onFocus={e => e.target.style.borderColor = "#00d4c8"} onBlur={e => e.target.style.borderColor = "rgba(0,212,200,.15)"} />
          </div>
          <div>
            <label style={{ fontSize: 13, fontWeight: 600, color: "#5a9aaa", marginBottom: 6, display: "block" }}>Confirmar nueva contraseña</label>
            <input style={inputStyle} type="password" placeholder="Repite la contraseña" value={form.confirm} onChange={e => setForm({ ...form, confirm: e.target.value })} onKeyDown={e => e.key === "Enter" && handleChange()} onFocus={e => e.target.style.borderColor = "#00d4c8"} onBlur={e => e.target.style.borderColor = "rgba(0,212,200,.15)"} />
          </div>

          {error && <p style={{ color: "#ef4444", fontSize: 13, textAlign: "center", margin: 0 }}>{error}</p>}
          {success && <p style={{ color: "#22c55e", fontSize: 13, textAlign: "center", margin: 0 }}>✓ Contraseña actualizada correctamente</p>}

          <button onClick={handleChange} disabled={saving || success} style={{
            width: "100%", padding: "15px",
            background: saving ? "rgba(0,212,200,.4)" : success ? "rgba(34,197,94,.8)" : "linear-gradient(135deg, #00d4c8, #7c3aed, #e91e8c)",
            color: "#fff", border: "none", borderRadius: 12,
            fontSize: 16, fontWeight: 700, cursor: saving ? "not-allowed" : "pointer", fontFamily: "'Source Sans 3'",
            boxShadow: success ? "none" : "0 4px 20px rgba(0,212,200,.2)",
          }}>
            {saving ? "GUARDANDO..." : success ? "✓ LISTO" : "CAMBIAR CONTRASEÑA"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── CHART HELPERS ───
function StatCard({ icon, value, label, color1, color2 }) {
  return (
    <div style={{ background: "rgba(0,212,200,.03)", borderRadius: 16, padding: "22px 20px", border: "1px solid rgba(0,212,200,.1)", textAlign: "center", flex: "1 1 160px" }}>
      <div style={{ fontSize: 28, marginBottom: 8 }}>{icon}</div>
      <div style={{ fontSize: 34, fontWeight: 800, background: `linear-gradient(135deg, ${color1}, ${color2})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", fontFamily: "'Playfair Display', serif" }}>{value}</div>
      <div style={{ fontSize: 12, color: "#3d6878", marginTop: 4, letterSpacing: .5 }}>{label}</div>
    </div>
  );
}

function HBar({ label, value, maxVal, suffix = "%", rank }) {
  const w = maxVal > 0 ? Math.round((value / maxVal) * 100) : 0;
  const colors = ["linear-gradient(90deg,#00d4c8,#e91e8c)", "linear-gradient(90deg,#00d4c8,#7c3aed)", "linear-gradient(90deg,#7c3aed,#e91e8c)", "linear-gradient(90deg,#0ea5e9,#00d4c8)"];
  const grad = colors[(rank || 0) % colors.length];
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
        <span style={{ fontSize: 13, color: "#8ec8d0", fontWeight: 500, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", paddingRight: 8 }}>
          {rank !== undefined && <span style={{ fontSize: 11, color: "#3d6878", marginRight: 6 }}>#{rank + 1}</span>}
          {label}
        </span>
        <span style={{ fontSize: 13, fontWeight: 700, background: grad, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", flexShrink: 0 }}>{value}{suffix}</span>
      </div>
      <div style={{ background: "rgba(255,255,255,.06)", borderRadius: 6, height: 9, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${w}%`, background: grad, borderRadius: 6, transition: "width 1s ease" }} />
      </div>
    </div>
  );
}

function ChartSection({ title, children, icon }) {
  return (
    <div style={{ background: "rgba(0,212,200,.03)", borderRadius: 18, padding: "20px 22px", border: "1px solid rgba(0,212,200,.1)", marginBottom: 20 }}>
      <div style={{ fontSize: 14, fontWeight: 700, color: "#5a9aaa", marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>
        <span>{icon}</span> {title}
        <div style={{ flex: 1, height: 1, background: "linear-gradient(90deg, rgba(0,212,200,.3), transparent)", marginLeft: 8 }} />
      </div>
      {children}
    </div>
  );
}

// ─── ADMIN: DASHBOARD TAB ───
function AdminDashboardTab({ admin, isSuperadmin }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      try {
        const [estRaw, progRaw, iglesiaRaw, distritoRaw] = await Promise.all([
          supaFetch("estudiantes?select=id,nombre,iglesia_id,iglesias(nombre,distrito_id,distritos(nombre))&order=nombre").catch(() => []),
          supaFetch("progreso?select=estudiante_id,leccion_id").catch(() => []),
          supaFetch("iglesias?select=id,nombre,distrito_id,distritos(nombre)&order=nombre").catch(() => []),
          isSuperadmin ? supaFetch("distritos?select=id,nombre&order=nombre").catch(() => []) : Promise.resolve([]),
        ]);

        const prog = progRaw || [];
        const myEst = isSuperadmin
          ? (estRaw || [])
          : (estRaw || []).filter(e => e.iglesias?.distrito_id === admin.distrito_id);
        const myIgl = isSuperadmin
          ? (iglesiaRaw || [])
          : (iglesiaRaw || []).filter(i => i.distrito_id === admin.distrito_id);

        // Top students by % progress
        const topStudents = myEst.map(e => ({
          nombre: e.nombre.split(" ").slice(0, 2).join(" "),
          completed: prog.filter(p => p.estudiante_id === e.id).length,
          pct: Math.round(prog.filter(p => p.estudiante_id === e.id).length / 20 * 100),
          iglesia: e.iglesias?.nombre || "—",
        })).sort((a, b) => b.pct - a.pct).slice(0, 8);

        // Lessons completion count (how many students completed each lesson)
        const lessonCounts = Array.from({ length: 20 }, (_, i) => ({
          leccion: i + 1,
          count: prog.filter(p => p.leccion_id === i + 1).length,
        }));

        // Church stats
        const churchStats = myIgl.map(ig => {
          const igEst = myEst.filter(e => e.iglesia_id === ig.id);
          const total = igEst.reduce((s, e) => s + prog.filter(p => p.estudiante_id === e.id).length, 0);
          const avgPct = igEst.length > 0 ? Math.round(total / (igEst.length * 20) * 100) : 0;
          return { nombre: ig.nombre, estudiantes: igEst.length, avgPct, total };
        }).sort((a, b) => b.avgPct - a.avgPct);

        // District stats (superadmin only)
        const districtStats = isSuperadmin ? (distritoRaw || []).map(dist => {
          const distEst = (estRaw || []).filter(e => e.iglesias?.distrito_id === dist.id);
          const total = distEst.reduce((s, e) => s + prog.filter(p => p.estudiante_id === e.id).length, 0);
          const avgPct = distEst.length > 0 ? Math.round(total / (distEst.length * 20) * 100) : 0;
          return { nombre: dist.nombre, estudiantes: distEst.length, avgPct };
        }).sort((a, b) => b.avgPct - a.avgPct) : [];

        const maxLesson = Math.max(...lessonCounts.map(l => l.count), 1);

        setData({
          totalEst: myEst.length,
          totalProg: prog.length,
          totalIgl: myIgl.length,
          totalDist: (distritoRaw || []).length,
          topStudents,
          lessonCounts,
          maxLesson,
          churchStats,
          districtStats,
          graduados: myEst.filter(e => prog.filter(p => p.estudiante_id === e.id).length === 20).length,
        });
      } catch {}
      setLoading(false);
    })();
  }, []);

  if (loading) return (
    <div style={{ textAlign: "center", padding: 60 }}>
      <div style={{ width: 40, height: 40, borderRadius: "50%", border: "3px solid rgba(0,212,200,.2)", borderTopColor: "#00d4c8", margin: "0 auto 12px", animation: "pulse 1s linear infinite" }} />
      <p style={{ color: "#3d6878", fontSize: 14 }}>Cargando estadísticas...</p>
    </div>
  );

  const maxStudent = Math.max(...(data.topStudents.map(s => s.pct)), 1);
  const maxChurch = Math.max(...(data.churchStats.map(c => c.avgPct)), 1);
  const maxDistrict = Math.max(...(data.districtStats.map(d => d.avgPct)), 1);

  return (
    <div>
      {/* Summary cards */}
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 24 }}>
        <StatCard icon="👥" value={data.totalEst} label="Estudiantes" color1="#00d4c8" color2="#0ea5e9" />
        <StatCard icon="🎓" value={data.graduados} label="Graduados" color1="#e91e8c" color2="#7c3aed" />
        <StatCard icon="📖" value={data.totalProg} label="Lecciones Completadas" color1="#7c3aed" color2="#00d4c8" />
        <StatCard icon="⛪" value={data.totalIgl} label="Iglesias" color1="#00d4c8" color2="#22c55e" />
        {isSuperadmin && <StatCard icon="🏛️" value={data.totalDist} label="Distritos" color1="#e91e8c" color2="#7c3aed" />}
      </div>

      {/* Top Students */}
      {data.topStudents.length > 0 && (
        <ChartSection title="Mejores Estudiantes por Progreso" icon="🏆">
          {data.topStudents.map((s, i) => (
            <div key={i}>
              <HBar label={`${s.nombre} — ${s.iglesia}`} value={s.pct} maxVal={maxStudent} suffix="%" rank={i} />
            </div>
          ))}
          {data.topStudents.length === 0 && <p style={{ color: "#3d6878", textAlign: "center", fontSize: 14 }}>No hay datos de progreso aún</p>}
        </ChartSection>
      )}

      {/* Lessons completion */}
      <ChartSection title="Lecciones Completadas por Estudiantes" icon="📚">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 10 }}>
          {data.lessonCounts.map((l, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ fontSize: 11, color: "#3d6878", width: 22, textAlign: "right", flexShrink: 0 }}>L{l.leccion}</div>
              <div style={{ flex: 1, background: "rgba(255,255,255,.06)", borderRadius: 4, height: 7, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${data.maxLesson > 0 ? Math.round(l.count / data.maxLesson * 100) : 0}%`, background: `linear-gradient(90deg, #00d4c8, #e91e8c)`, borderRadius: 4, transition: "width 1s ease" }} />
              </div>
              <div style={{ fontSize: 12, color: "#00d4c8", fontWeight: 700, width: 22, flexShrink: 0 }}>{l.count}</div>
            </div>
          ))}
        </div>
        <p style={{ fontSize: 11, color: "#3d6878", textAlign: "right", marginTop: 10 }}>Número de estudiantes que completaron cada lección</p>
      </ChartSection>

      {/* Church ranking */}
      {data.churchStats.length > 0 && (
        <ChartSection title="Ranking de Iglesias por Promedio de Progreso" icon="⛪">
          {data.churchStats.map((c, i) => (
            <div key={i}>
              <HBar label={`${c.nombre} (${c.estudiantes} est.)`} value={c.avgPct} maxVal={maxChurch} suffix="%" rank={i} />
            </div>
          ))}
        </ChartSection>
      )}

      {/* District ranking (superadmin only) */}
      {isSuperadmin && data.districtStats.length > 0 && (
        <ChartSection title="Ranking de Distritos por Promedio de Progreso" icon="🏛️">
          {data.districtStats.map((d, i) => (
            <div key={i}>
              <HBar label={`${d.nombre} (${d.estudiantes} est.)`} value={d.avgPct} maxVal={maxDistrict} suffix="%" rank={i} />
            </div>
          ))}
        </ChartSection>
      )}

      {data.totalEst === 0 && (
        <div style={{ textAlign: "center", padding: "40px 20px", color: "#3d6878" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>📊</div>
          <p>No hay datos suficientes para mostrar gráficas todavía.</p>
          <p style={{ fontSize: 13, marginTop: 8 }}>Los gráficos aparecerán cuando haya estudiantes registrados.</p>
        </div>
      )}
    </div>
  );
}

// ─── ADMIN: DISTRITOS TAB ───
function AdminDistritosTab() {
  const [distritos, setDistritos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newName, setNewName] = useState("");
  const [adding, setAdding] = useState(false);

  const load = async () => {
    try {
      const data = await supaFetch("distritos?select=id,nombre&order=nombre");
      setDistritos(data || []);
    } catch {}
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const addDistrito = async () => {
    if (!newName.trim()) return;
    setAdding(true);
    try {
      await supaFetch("distritos", { method: "POST", body: { nombre: newName.trim() } });
      setNewName("");
      await load();
    } catch (err) { alert("Error al crear distrito"); }
    setAdding(false);
  };

  const deleteDistrito = async (id, nombre) => {
    if (!confirm(`¿Eliminar el distrito "${nombre}"? Esto también eliminará sus iglesias.`)) return;
    try {
      await supaFetch(`distritos?id=eq.${id}`, { method: "DELETE" });
      await load();
    } catch (err) { alert("Error al eliminar. Puede tener iglesias o pastores vinculados."); }
  };

  if (loading) return <div style={{ color: "#3d6878", textAlign: "center", padding: 40 }}>Cargando...</div>;

  const inputStyle = { width: "100%", padding: "12px 14px", background: "rgba(0,212,200,.04)", border: "1.5px solid rgba(0,212,200,.15)", borderRadius: 10, color: "#e8f4f8", fontSize: 14, fontFamily: "'Source Sans 3'", outline: "none", boxSizing: "border-box" };

  return (
    <div>
      {/* Add new */}
      <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
        <input style={{ ...inputStyle, flex: 1 }} placeholder="Nombre del nuevo distrito..." value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key === "Enter" && addDistrito()} onFocus={e => e.target.style.borderColor = "#00d4c8"} onBlur={e => e.target.style.borderColor = "rgba(0,212,200,.15)"} />
        <button onClick={addDistrito} disabled={adding} style={{
          padding: "12px 24px", background: "linear-gradient(135deg, #00d4c8, #e91e8c)",
          color: "#fff", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700,
          cursor: "pointer", fontFamily: "'Source Sans 3'", whiteSpace: "nowrap",
        }}>
          {adding ? "..." : "+ Agregar"}
        </button>
      </div>

      {/* List */}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {distritos.map(d => (
          <div key={d.id} style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            padding: "14px 18px", background: "rgba(0,212,200,.03)",
            borderRadius: 12, border: "1px solid rgba(0,212,200,.1)",
          }}>
            <span style={{ fontSize: 15, color: "#e8f4f8", fontWeight: 500 }}>🏛️ {d.nombre}</span>
            <button onClick={() => deleteDistrito(d.id, d.nombre)} style={{
              background: "none", border: "1px solid rgba(239,68,68,.3)",
              color: "#ef4444", padding: "4px 12px", borderRadius: 8,
              fontSize: 11, cursor: "pointer", fontFamily: "'Source Sans 3'",
            }}>
              Eliminar
            </button>
          </div>
        ))}
        {distritos.length === 0 && <p style={{ color: "#3d6878", textAlign: "center", padding: 20 }}>No hay distritos registrados</p>}
      </div>
      <div style={{ marginTop: 16, fontSize: 13, color: "#3d6878", textAlign: "center" }}>
        Total: {distritos.length} distrito{distritos.length !== 1 ? "s" : ""}
      </div>
    </div>
  );
}

// ─── ADMIN: IGLESIAS TAB ───
function AdminIglesiasTab({ admin, isSuperadmin }) {
  const [distritos, setDistritos] = useState([]);
  const [iglesias, setIglesias] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedDistrito, setSelectedDistrito] = useState(isSuperadmin ? "" : admin.distrito_id);
  const [newIglesia, setNewIglesia] = useState("");
  const [newCodigo, setNewCodigo] = useState("");
  const [adding, setAdding] = useState(false);

  const load = async () => {
    try {
      const [dData, iData] = await Promise.all([
        isSuperadmin ? supaFetch("distritos?select=id,nombre&order=nombre") : supaFetch(`distritos?select=id,nombre&id=eq.${admin.distrito_id}`),
        isSuperadmin ? supaFetch("iglesias?select=id,nombre,codigo,distrito_id,distritos(nombre)&order=nombre") : supaFetch(`iglesias?select=id,nombre,codigo,distrito_id,distritos(nombre)&distrito_id=eq.${admin.distrito_id}&order=nombre`),
      ]);
      setDistritos(dData || []);
      setIglesias(iData || []);
      if (!isSuperadmin && dData?.length > 0) setSelectedDistrito(dData[0].id);
    } catch {}
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const filteredIglesias = selectedDistrito ? iglesias.filter(i => i.distrito_id === selectedDistrito) : iglesias;

  const addIglesia = async () => {
    if (!newIglesia.trim() || !selectedDistrito) return;
    setAdding(true);
    try {
      await supaFetch("iglesias", {
        method: "POST",
        body: {
          nombre: newIglesia.trim(),
          distrito_id: selectedDistrito,
          codigo: newCodigo.trim().toUpperCase() || newIglesia.trim().toUpperCase().replace(/\s+/g, "-") + "-2026",
        },
      });
      setNewIglesia("");
      setNewCodigo("");
      await load();
    } catch (err) { alert("Error al crear iglesia. El código puede estar duplicado."); }
    setAdding(false);
  };

  const deleteIglesia = async (id, nombre) => {
    if (!confirm(`¿Eliminar la iglesia "${nombre}"?`)) return;
    try {
      await supaFetch(`iglesias?id=eq.${id}`, { method: "DELETE" });
      await load();
    } catch (err) { alert("Error al eliminar"); }
  };

  const [iglesiaStats, setIglesiaStats] = useState({});

  useEffect(() => {
    (async () => {
      try {
        const [estData, progData] = await Promise.all([
          supaFetch("estudiantes?select=id,iglesia_id").catch(() => []),
          supaFetch("progreso?select=estudiante_id,leccion_id").catch(() => []),
        ]);
        const prog = progData || [];
        const stats = {};
        (estData || []).forEach(e => {
          const completed = prog.filter(p => p.estudiante_id === e.id).length;
          if (!stats[e.iglesia_id]) stats[e.iglesia_id] = { estudiantes: 0, totalLecciones: 0 };
          stats[e.iglesia_id].estudiantes += 1;
          stats[e.iglesia_id].totalLecciones += completed;
        });
        Object.keys(stats).forEach(id => {
          stats[id].avgPct = stats[id].estudiantes > 0 ? Math.round(stats[id].totalLecciones / (stats[id].estudiantes * 20) * 100) : 0;
        });
        setIglesiaStats(stats);
      } catch {}
    })();
  }, [iglesias]);

  if (loading) return <div style={{ color: "#3d6878", textAlign: "center", padding: 40 }}>Cargando...</div>;

  const inputStyle = { padding: "12px 14px", background: "rgba(0,212,200,.04)", border: "1.5px solid rgba(0,212,200,.15)", borderRadius: 10, color: "#e8f4f8", fontSize: 14, fontFamily: "'Source Sans 3'", outline: "none", boxSizing: "border-box" };

  const statsIglesias = filteredIglesias.map(i => ({ ...i, ...(iglesiaStats[i.id] || { estudiantes: 0, avgPct: 0 }) })).sort((a, b) => b.avgPct - a.avgPct);
  const maxPct = Math.max(...statsIglesias.map(i => i.avgPct), 1);

  return (
    <div>
      {/* Chart section */}
      {statsIglesias.length > 0 && (
        <ChartSection title="Ranking de Iglesias — Promedio de Progreso" icon="📊">
          {statsIglesias.map((i, idx) => (
            <HBar key={i.id} label={`${i.nombre}${i.distritos ? ` (${i.distritos.nombre})` : ""}`} value={i.avgPct} maxVal={maxPct} suffix="%" rank={idx} />
          ))}
          <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginTop: 12, paddingTop: 12, borderTop: "1px solid rgba(0,212,200,.08)" }}>
            {statsIglesias.map(i => (
              <div key={i.id} style={{ fontSize: 12, color: "#3d6878" }}>
                <span style={{ color: "#5a9aaa", fontWeight: 600 }}>⛪ {i.nombre}</span>: {i.estudiantes || 0} est.
              </div>
            ))}
          </div>
        </ChartSection>
      )}

      {/* Distrito filter */}
      {isSuperadmin && (
        <div style={{ marginBottom: 16 }}>
          <select style={{ ...inputStyle, width: "100%", appearance: "none", cursor: "pointer" }} value={selectedDistrito} onChange={e => setSelectedDistrito(e.target.value)}>
            <option value="" style={{ background: "#030f1c" }}>Todos los distritos</option>
            {distritos.map(d => <option key={d.id} value={d.id} style={{ background: "#030f1c" }}>{d.nombre}</option>)}
          </select>
        </div>
      )}

      {/* Add new */}
      {selectedDistrito && (
        <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap" }}>
          <input style={{ ...inputStyle, flex: 2, minWidth: 150 }} placeholder="Nombre de la iglesia..." value={newIglesia} onChange={e => setNewIglesia(e.target.value)} onFocus={e => e.target.style.borderColor = "#00d4c8"} onBlur={e => e.target.style.borderColor = "rgba(0,212,200,.15)"} />
          <input style={{ ...inputStyle, flex: 1, minWidth: 120 }} placeholder="Código (opcional)" value={newCodigo} onChange={e => setNewCodigo(e.target.value.toUpperCase())} onFocus={e => e.target.style.borderColor = "#00d4c8"} onBlur={e => e.target.style.borderColor = "rgba(0,212,200,.15)"} />
          <button onClick={addIglesia} disabled={adding} style={{
            padding: "12px 20px", background: "linear-gradient(135deg, #00d4c8, #7c3aed, #e91e8c)",
            color: "#fff", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700,
            cursor: "pointer", fontFamily: "'Source Sans 3'", whiteSpace: "nowrap",
          }}>
            {adding ? "..." : "+ Agregar"}
          </button>
        </div>
      )}

      {/* List */}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>

// ─── ADMIN: PASTORES TAB ───
function AdminPastoresTab() {
  const [pastores, setPastores] = useState([]);
  const [distritos, setDistritos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ nombre: "", email: "", password: "", distrito_id: "", rol: "pastor" });
  const [adding, setAdding] = useState(false);

  const load = async () => {
    try {
      const [pData, dData] = await Promise.all([
        supaFetch("pastores?select=id,nombre,email,rol,distrito_id,distritos(nombre)&order=nombre"),
        supaFetch("distritos?select=id,nombre&order=nombre"),
      ]);
      setPastores(pData || []);
      setDistritos(dData || []);
    } catch {}
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const addPastor = async () => {
    if (!form.nombre.trim() || !form.email.trim() || !form.password.trim()) return;
    setAdding(true);
    try {
      await supaFetch("pastores", {
        method: "POST",
        body: {
          nombre: form.nombre.trim(),
          email: form.email.trim(),
          password_hash: "temp_" + form.password.trim(),
          distrito_id: form.distrito_id || null,
          rol: form.rol,
        },
      });

      // Send welcome email via EmailJS
      const distritoNombre = distritos.find(d => d.id === form.distrito_id)?.nombre || "Sin distrito";
      try {
        await fetch("https://api.emailjs.com/api/v1.0/email/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            service_id: "service_lrvmew4",
            template_id: "template_pz3csse",
            user_id: "TJcUZKEVtkhvH9ygu",
            template_params: {
              email: form.email.trim(),
              pastor_nombre: form.nombre.trim(),
              pastor_email: form.email.trim(),
              password_temp: form.password.trim(),
              distrito_nombre: distritoNombre,
              app_url: "https://iglesiaadventista-cucuta.github.io/curso-fe-de-jesus/",
            },
          }),
        });
      } catch (emailErr) {
        console.error("Error sending email:", emailErr);
      }

      setForm({ nombre: "", email: "", password: "", distrito_id: "", rol: "pastor" });
      setShowForm(false);
      await load();
    } catch (err) { alert("Error al crear pastor. El email puede estar duplicado."); }
    setAdding(false);
  };

  const deletePastor = async (id, nombre) => {
    if (!confirm(`¿Eliminar al pastor "${nombre}"?`)) return;
    try {
      await supaFetch(`pastores?id=eq.${id}`, { method: "DELETE" });
      await load();
    } catch (err) { alert("Error al eliminar"); }
  };

  if (loading) return <div style={{ color: "#3d6878", textAlign: "center", padding: 40 }}>Cargando...</div>;

  const inputStyle = { width: "100%", padding: "12px 14px", background: "rgba(0,212,200,.04)", border: "1.5px solid rgba(0,212,200,.15)", borderRadius: 10, color: "#e8f4f8", fontSize: 14, fontFamily: "'Source Sans 3'", outline: "none", boxSizing: "border-box" };

  return (
    <div>
      {!showForm ? (
        <button onClick={() => setShowForm(true)} style={{
          marginBottom: 20, padding: "12px 24px", background: "linear-gradient(135deg, #00d4c8, #7c3aed, #e91e8c)",
          color: "#fff", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700,
          cursor: "pointer", fontFamily: "'Source Sans 3'",
        }}>
          + Crear Pastor / Admin
        </button>
      ) : (
        <div style={{ background: "rgba(0,212,200,.03)", borderRadius: 16, padding: "20px", border: "1px solid rgba(0,212,200,.15)", marginBottom: 20, display: "flex", flexDirection: "column", gap: 12 }}>
          <h3 style={{ background: "linear-gradient(135deg,#00d4c8,#e91e8c)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", fontSize: 16, fontWeight: 700, margin: 0, fontFamily: "'Source Sans 3'" }}>Nuevo Pastor</h3>
          <input style={inputStyle} placeholder="Nombre completo" value={form.nombre} onChange={e => setForm({ ...form, nombre: e.target.value })} onFocus={e => e.target.style.borderColor = "#00d4c8"} onBlur={e => e.target.style.borderColor = "rgba(0,212,200,.15)"} />
          <input style={inputStyle} placeholder="Email" type="email" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} onFocus={e => e.target.style.borderColor = "#00d4c8"} onBlur={e => e.target.style.borderColor = "rgba(0,212,200,.15)"} />
          <input style={inputStyle} placeholder="Contraseña temporal" type="text" value={form.password} onChange={e => setForm({ ...form, password: e.target.value })} onFocus={e => e.target.style.borderColor = "#00d4c8"} onBlur={e => e.target.style.borderColor = "rgba(0,212,200,.15)"} />
          <select style={{ ...inputStyle, appearance: "none", cursor: "pointer" }} value={form.distrito_id} onChange={e => setForm({ ...form, distrito_id: e.target.value })}>
            <option value="" style={{ background: "#030f1c" }}>Sin distrito asignado</option>
            {distritos.map(d => <option key={d.id} value={d.id} style={{ background: "#030f1c" }}>{d.nombre}</option>)}
          </select>
          <select style={{ ...inputStyle, appearance: "none", cursor: "pointer" }} value={form.rol} onChange={e => setForm({ ...form, rol: e.target.value })}>
            <option value="pastor" style={{ background: "#030f1c" }}>Pastor</option>
            <option value="superadmin" style={{ background: "#030f1c" }}>Super Admin</option>
          </select>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={addPastor} disabled={adding} style={{ flex: 1, padding: "12px", background: "linear-gradient(135deg, #00d4c8, #e91e8c)", color: "#fff", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "'Source Sans 3'" }}>
              {adding ? "Creando..." : "Crear"}
            </button>
            <button onClick={() => setShowForm(false)} style={{ padding: "12px 20px", background: "rgba(255,255,255,.04)", border: "1px solid rgba(0,212,200,.15)", borderRadius: 10, color: "#5a9aaa", fontSize: 14, cursor: "pointer", fontFamily: "'Source Sans 3'" }}>
              Cancelar
            </button>
          </div>
        </div>
      )}

      {/* List */}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {pastores.map(p => (
          <div key={p.id} style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            padding: "14px 18px", background: "rgba(0,212,200,.03)",
            borderRadius: 12, border: "1px solid rgba(0,212,200,.1)",
            flexWrap: "wrap", gap: 8,
          }}>
            <div>
              <span style={{ fontSize: 15, color: "#e8f4f8", fontWeight: 600 }}>👤 {p.nombre}</span>
              <span style={{ fontSize: 11, marginLeft: 8, padding: "2px 8px", borderRadius: 6, fontWeight: 600, background: p.rol === "superadmin" ? "rgba(0,212,200,.15)" : "rgba(34,197,94,.12)", color: p.rol === "superadmin" ? "#00d4c8" : "#22c55e" }}>
                {p.rol === "superadmin" ? "SUPERADMIN" : "PASTOR"}
              </span>
              <div style={{ fontSize: 12, color: "#3d6878", marginTop: 2 }}>{p.email}</div>
              {p.distritos && <div style={{ fontSize: 11, color: "#5a9aaa", marginTop: 1 }}>Distrito: {p.distritos.nombre}</div>}
            </div>
            <button onClick={() => deletePastor(p.id, p.nombre)} style={{
              background: "none", border: "1px solid rgba(239,68,68,.3)",
              color: "#ef4444", padding: "4px 12px", borderRadius: 8,
              fontSize: 11, cursor: "pointer", fontFamily: "'Source Sans 3'",
            }}>
              Eliminar
            </button>
          </div>
        ))}
      </div>
      <div style={{ marginTop: 16, fontSize: 13, color: "#3d6878", textAlign: "center" }}>
        Total: {pastores.length} pastores/admins
      </div>
    </div>
  );
}

// ─── ADMIN: ESTUDIANTES TAB ───
function AdminEstudiantesTab({ admin, isSuperadmin }) {
  const [estudiantes, setEstudiantes] = useState([]);
  const [progreso, setProgreso] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [search, setSearch] = useState("");

  useEffect(() => {
    (async () => {
      try {
        const estQuery = isSuperadmin
          ? "estudiantes?select=id,nombre,telefono,iglesia_id,instructor_nombre,instructor_rol,created_at,iglesias(nombre,distritos(nombre))&order=nombre"
          : `estudiantes?select=id,nombre,telefono,iglesia_id,instructor_nombre,instructor_rol,created_at,iglesias!inner(nombre,distrito_id,distritos(nombre))&iglesias.distrito_id=eq.${admin.distrito_id}&order=nombre`;
        const [estData, progData] = await Promise.all([
          supaFetch(estQuery).catch(() => []),
          supaFetch("progreso?select=estudiante_id,leccion_id,completed_at").catch(() => []),
        ]);
        setEstudiantes(estData || []);
        setProgreso(progData || []);
      } catch {}
      setLoading(false);
    })();
  }, []);

  const getProgress = (id) => {
    const completed = progreso.filter(p => p.estudiante_id === id).length;
    return { completed, pct: Math.round((completed / 20) * 100) };
  };

  if (loading) return <div style={{ color: "#3d6878", textAlign: "center", padding: 40 }}>Cargando...</div>;

  const filtered = estudiantes.filter(e =>
    e.nombre.toLowerCase().includes(search.toLowerCase()) ||
    (e.iglesias?.nombre || "").toLowerCase().includes(search.toLowerCase())
  );

  // Sort by progress desc
  const sorted = [...filtered].sort((a, b) => getProgress(b.id).pct - getProgress(a.id).pct);

  return (
    <div>
      {/* Header + search */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
        <div style={{ fontSize: 14, color: "#5a9aaa" }}>
          <span style={{ fontWeight: 700, color: "#00d4c8" }}>{estudiantes.length}</span> estudiante{estudiantes.length !== 1 ? "s" : ""} — ordenados por progreso
        </div>
        <input
          value={search} onChange={e => setSearch(e.target.value)}
          placeholder="Buscar por nombre o iglesia..."
          style={{ padding: "9px 14px", background: "rgba(0,212,200,.05)", border: "1px solid rgba(0,212,200,.2)", borderRadius: 10, color: "#e8f4f8", fontSize: 13, fontFamily: "'Source Sans 3'", outline: "none", minWidth: 220 }}
          onFocus={e => e.target.style.borderColor = "#00d4c8"} onBlur={e => e.target.style.borderColor = "rgba(0,212,200,.2)"}
        />
      </div>

      {sorted.length === 0 ? (
        <p style={{ color: "#3d6878", textAlign: "center", padding: 40 }}>No hay estudiantes{search ? " que coincidan" : " registrados"}</p>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {sorted.map((est, idx) => {
            const prog = getProgress(est.id);
            return (
              <div key={est.id}
                onClick={() => setSelected(est)}
                style={{
                  padding: "14px 18px", background: "rgba(0,212,200,.03)",
                  borderRadius: 14, border: "1px solid rgba(0,212,200,.1)",
                  cursor: "pointer", transition: "all .2s",
                }}
                onMouseOver={e => { e.currentTarget.style.background = "rgba(0,212,200,.07)"; e.currentTarget.style.borderColor = "rgba(0,212,200,.25)"; }}
                onMouseOut={e => { e.currentTarget.style.background = "rgba(0,212,200,.03)"; e.currentTarget.style.borderColor = "rgba(0,212,200,.1)"; }}
              >
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 32, height: 32, borderRadius: "50%", background: `linear-gradient(135deg, #00d4c8, #e91e8c)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, color: "#fff", flexShrink: 0 }}>
                      {idx + 1}
                    </div>
                    <div>
                      <div style={{ fontSize: 15, color: "#e8f4f8", fontWeight: 600 }}>{est.nombre}</div>
                      <div style={{ fontSize: 11, color: "#3d6878" }}>
                        {est.iglesias ? `⛪ ${est.iglesias.nombre}` : "Sin iglesia"}{est.iglesias?.distritos ? ` · ${est.iglesias.distritos.nombre}` : ""}
                      </div>
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 14, flexShrink: 0 }}>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 22, fontWeight: 800, background: prog.pct === 100 ? "linear-gradient(135deg,#22c55e,#16a34a)" : "linear-gradient(135deg,#00d4c8,#e91e8c)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", fontFamily: "'Playfair Display', serif" }}>{prog.pct}%</div>
                      <div style={{ fontSize: 11, color: "#3d6878" }}>{prog.completed}/20 lecciones</div>
                      {prog.pct === 100 && <div style={{ fontSize: 10, color: "#22c55e", fontWeight: 700 }}>🎓 GRADUADO</div>}
                    </div>
                    <span style={{ fontSize: 16, color: "#3d6878" }}>›</span>
                  </div>
                </div>
                {/* Mini progress bar */}
                <div style={{ marginTop: 8, background: "rgba(255,255,255,.05)", borderRadius: 4, height: 5, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${prog.pct}%`, background: prog.pct === 100 ? "linear-gradient(90deg,#22c55e,#16a34a)" : "linear-gradient(90deg,#00d4c8,#e91e8c)", borderRadius: 4, transition: "width .6s ease" }} />
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Student Detail Modal */}
      {selected && (
        <StudentDetailModal
          est={selected}
          prog={progreso.filter(p => p.estudiante_id === selected.id)}
          onClose={() => setSelected(null)}
          onPrint={() => printCertificado(selected, progreso.filter(p => p.estudiante_id === selected.id).length)}
        />
      )}
    </div>
  );
}

            ["🏛️ Distrito", est.iglesias?.distritos?.nombre || "—"],
            ["👤 Instructor", est.instructor_nombre || "—"],
            ["🎓 Rol", est.instructor_rol || "—"],
          ].map(([label, val]) => (
            <div key={label} style={{ background: "rgba(0,212,200,.04)", borderRadius: 10, padding: "10px 14px", border: "1px solid rgba(0,212,200,.1)" }}>
              <div style={{ fontSize: 11, color: "#3d6878", marginBottom: 3 }}>{label}</div>
              <div style={{ fontSize: 13, color: "#8ec8d0", fontWeight: 600 }}>{val}</div>
            </div>
          ))}
        </div>

        {/* Progress summary */}
        <div style={{ background: "rgba(0,212,200,.05)", borderRadius: 14, padding: "16px 18px", border: "1px solid rgba(0,212,200,.15)", marginBottom: 18 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 11, color: "#3d6878", letterSpacing: 1 }}>PROGRESO TOTAL</div>
              <div style={{ fontSize: 28, fontWeight: 800, background: isGraduado ? "linear-gradient(135deg,#22c55e,#16a34a)" : "linear-gradient(135deg,#00d4c8,#e91e8c)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", fontFamily: "'Playfair Display', serif" }}>
                {completedIds.length}<span style={{ fontSize: 16, WebkitTextFillColor: "#3d6878" }}>/20</span>
              </div>
              {isGraduado && <div style={{ fontSize: 12, color: "#22c55e", fontWeight: 700 }}>🎓 GRADUADO</div>}
            </div>
            <div style={{ fontSize: 30, fontWeight: 800, background: isGraduado ? "linear-gradient(135deg,#22c55e,#16a34a)" : "linear-gradient(135deg,#00d4c8,#e91e8c)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", fontFamily: "'Playfair Display', serif" }}>{pct}%</div>
          </div>
          <div style={{ background: "rgba(255,255,255,.06)", borderRadius: 6, height: 8, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pct}%`, background: isGraduado ? "linear-gradient(90deg,#22c55e,#16a34a)" : "linear-gradient(90deg,#00d4c8,#e91e8c)", borderRadius: 6, transition: "width .6s" }} />
          </div>
        </div>

        {/* Lessons grid */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 12, color: "#3d6878", marginBottom: 10, letterSpacing: 1 }}>LECCIONES COMPLETADAS</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 6 }}>
            {Array.from({ length: 20 }, (_, i) => {
              const done = completedIds.includes(i + 1);
              return (
                <div key={i} style={{
                  borderRadius: 8, padding: "8px 4px", textAlign: "center",
                  background: done ? "rgba(0,212,200,.12)" : "rgba(255,255,255,.03)",
                  border: `1px solid ${done ? "rgba(0,212,200,.3)" : "rgba(255,255,255,.06)"}`,
                }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: done ? "#00d4c8" : "#3d6878" }}>{done ? "✓" : i + 1}</div>
                  <div style={{ fontSize: 9, color: done ? "#5a9aaa" : "#3d6878" }}>L{i + 1}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Actions */}
        <div style={{ display: "flex", gap: 10 }}>
          {isGraduado && (
            <button onClick={onPrint} style={{
              flex: 1, padding: "13px", background: "linear-gradient(135deg,#00d4c8,#7c3aed,#e91e8c)",
              color: "#fff", border: "none", borderRadius: 12, fontSize: 14, fontWeight: 700,
              cursor: "pointer", fontFamily: "'Source Sans 3'",
              boxShadow: "0 4px 20px rgba(0,212,200,.25)",
            }}>
              🖨️ Imprimir Certificado
            </button>
          )}
          <button onClick={onClose} style={{
            flex: isGraduado ? "0 0 auto" : 1, padding: "13px 20px",
            background: "rgba(255,255,255,.05)", border: "1px solid rgba(255,255,255,.1)",
            color: "#5a9aaa", borderRadius: 12, fontSize: 14, cursor: "pointer", fontFamily: "'Source Sans 3'",
          }}>
            Cerrar
          </button>
        </div>
      </div>
    </div>
  );
}

    // ─── RENDER ───
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
